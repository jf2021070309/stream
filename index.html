<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Xero | Tu Estación Digital</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" href="icon-512.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Poppins:wght@600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://jf2021070309.github.io/radio-xero/">
    <meta property="og:title" content="📻 Radio Xero 🔥 EN VIVO">
    <meta property="og:description" content="🎧 Música sin parar 24/7 | ⚡ Dale play y súbele al volumen.">
    <meta property="og:image" content="https://jf2021070309.github.io/radio-xero/icon-192.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://jf2021070309.github.io/radio-xero/">
    <meta property="twitter:title" content="📻 Radio Xero 🔥 EN VIVO">
    <meta property="twitter:description" content="🎧 Música sin parar 24/7 | ⚡ Dale play y súbele al volumen.">
    <meta property="twitter:image" content="https://jf2021070309.github.io/radio-xero/icon-192.png">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="top-bg"></div>

    <header>
        <h1 class="visually-hidden">Radio Xero</h1>
        <div class="theme-switch" id="themeToggle" onclick="rxToggleTheme()" aria-label="Cambiar tema">
            <div class="switch-knob">
                <i class="fas fa-sun"></i>
            </div>
        </div>
        <img src="logo%20xero.png" alt="Radio Xero Logo" class="main-logo">
    </header>

    <div class="main-wrapper">

        <!-- ─── CUSTOM PLAYER CARD (REDESIGNED) ─── -->
        <section class="card player-card">


            <!-- Middle: Metadata & Visualizer -->
            <div class="rx-player-content">
                <!-- Top: VIDEOS DE AVATAR -->
                <div class="rx-small-logo">
                    <video id="avatarVideo" autoplay muted playsinline></video>
                </div>

                <!-- Bottom Group (Visualizer, meta, controls, status) -->
                <div class="rx-player-bottom-group">
                    <!-- Enhanced Visualizer Area (Central Position) -->
                    <div class="rx-viz-layout-wrapper">
                        <!-- Lateral izquierdo (Tarjeta de Regalos) -->
                        <div class="rx-viz-side rx-viz-side-left rx-side-card">
                            <div class="rx-side-header">Gifts</div>
                            <div class="rx-side-body"></div>
                        </div>

                        <!-- Centro: El contenedor del visualizador con bordes y fondo -->
                        <div class="rx-viz-area" id="rxVizArea">
                            <div class="rx-viz-bg-anim"></div>

                            <div class="rx-viz-selector">
                                <span class="rx-viz-title-badge">
                                    <i class="fas fa-th"></i> LED
                                </span>
                            </div>

                            <div class="rx-viz-container" id="rxVizContainer">
                                <div class="rx-vu-row">
                                    <span class="rx-vu-label">L</span>
                                    <div class="rx-vu-meter" id="vuL"></div>
                                </div>
                                <div class="rx-vu-row">
                                    <span class="rx-vu-label">R</span>
                                    <div class="rx-vu-meter" id="vuR"></div>
                                </div>
                            </div>

                            <canvas id="rxCanvas" class="rx-viz-canvas"></canvas>
                        </div>

                        <!-- Lateral derecho (Tarjeta de 1 Moneda) -->
                        <div class="rx-viz-side rx-viz-side-right rx-side-card">
                            <div class="rx-side-header">1 Coins</div>
                            <div class="rx-side-body"></div>
                        </div>
                    </div>

                    <div class="rx-meta">
                        <div class="rx-live-label">
                            <span class="rx-dot" id="liveDot"></span>
                            Estás Escuchando
                        </div>

                        <div class="rx-track" id="trackInfo">
                            <i class="fas fa-music rx-track-icon"></i>
                            <div class="rx-track-scroller">
                                <div class="rx-track-content">
                                    <span id="trackText">Sintonizando señal...</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Bottom: Controls -->
                    <div class="rx-controls">
                        <button class="rx-play-btn" id="playBtn" onclick="rxToggle()" aria-label="Reproducir / Pausar">
                            <svg id="playIcon" width="32" height="32" viewBox="0 0 24 24" fill="none">
                                <polygon points="6,4 20,12 6,20" fill="currentColor" />
                            </svg>
                        </button>

                        <div class="rx-vol">
                            <button class="rx-mute-btn" id="muteBtn" onclick="rxToggleMute()" aria-label="Silenciar">
                                <svg id="muteIcon" viewBox="0 0 24 24">
                                    <path
                                        d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" />
                                </svg>
                            </button>
                            <div class="rx-vol-container">
                                <input type="range" min="0" max="100" value="50" id="volSlider" class="rx-vol-slider"
                                    oninput="rxSetVol(this.value)" aria-label="Volumen">
                                <span class="rx-vol-value" id="volValue">50%</span>
                            </div>
                        </div>
                    </div>

                    <div class="rx-status" id="rxStatus" style="margin-top: 15px; font-weight: 500;">Listo para escuchar
                    </div>
                </div>
            </div>
        </section>


        <!-- Info grid -->
        <div class="info-grid">
            <section class="card info-card">
                <h2>
                    <div class="rx-icon-wrap rx-icon-share">
                        <div></div>
                        <div></div>
                        <div></div>
                    </div>
                    Comparte el Sonido
                </h2>
                <p style="margin-bottom: 0.5rem !important;">Lleva la mejor música a todas partes. Comparte el enlace
                    con tus amigos y expande la experiencia Xero.</p>

                <div class="social-grid">
                    <a id="rx-wa-btn" href="#" target="_blank" class="social-btn whatsapp"
                        aria-label="Compartir en WhatsApp">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                    <a id="rx-fb-btn" href="#" target="_blank" class="social-btn facebook"
                        aria-label="Compartir en Facebook">
                        <i class="fab fa-facebook-f"></i>
                    </a>
                    <a id="rx-tw-btn" href="#" target="_blank" class="social-btn twitter"
                        aria-label="Compartir en Twitter">
                        <i class="fab fa-twitter"></i>
                    </a>
                    <a href="#" onclick="rxCopyLink(event, this)" class="social-btn copy-link"
                        style="position: relative;" aria-label="Copiar Enlace">
                        <i class="fas fa-link"></i>
                    </a>
                </div>
            </section>
        </div>
    </div>

    <!-- Bottom Navigation Footer Estilo TikTok -->
    <nav class="rx-footer-nav">
        <a class="nav-item" onclick="handleNav('music')">
            <div class="icon-circle music-circle">
                <i class="fas fa-music"></i>
            </div>
            <span class="nav-label">Música</span>
        </a>
        <a class="nav-item" onclick="handleNav('follow')">
            <div class="icon-circle follow-circle">
                <i class="fas fa-plus"></i>
            </div>
            <span class="nav-label">Seguir</span>
        </a>
        <a class="nav-item" onclick="handleNav('gift')">
            <div class="icon-circle gift-circle">
                <i class="fas fa-gift"></i>
            </div>
            <span class="nav-label">Regalo</span>
        </a>
        <a class="nav-item" onclick="handleNav('more')">
            <div class="icon-circle more-circle">
                <i class="fas fa-ellipsis-h"></i>
            </div>
            <span class="nav-label">Más</span>
        </a>
    </nav>

    <!-- Audio element oculto -->
    <audio id="rxAudio" preload="none"></audio>

    <script src="app.js"></script>
</body>

</html>
